<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expérience Vidéo</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: black; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Change en 'contain' si tu veux voir les bords de la vidéo */
            display: none;
        }

        #overlay {
            text-align: center;
            color: white;
            cursor: pointer;
            z-index: 10;
        }

        .play-button {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            border: 2px solid white;
        }
    </style>
</head>
<body onclick="startExperience()">

    <div id="overlay">
        <div class="play-button">
            <div style="width: 0; height: 0; border-top: 15px solid transparent; border-bottom: 15px solid transparent; border-left: 25px solid white; margin-left: 5px;"></div>
        </div>
        <p style="letter-spacing: 1px; font-weight: 300;">TOUCHEZ POUR LANCER</p>
    </div>

    <video id="myVideo" playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

    <script>
        function startExperience() {
            var vid = document.getElementById("myVideo");
            var overlay = document.getElementById("overlay");
            var docElm = document.documentElement;

            // Passage en Plein Écran
            if (docElm.requestFullscreen) {
                docElm.requestFullscreen();
            } else if (docElm.webkitRequestFullscreen) {
                docElm.webkitRequestFullscreen();
            }

            overlay.style.display = "none";
            vid.style.display = "block";
            
            // On s'assure que le son est activé
            vid.muted = false; 
            vid.play();
        }

        // On ne fait RIEN à la fin de la vidéo (on supprime la fonction onended précédente)
        // La vidéo restera naturellement sur sa dernière image.
    </script>
</body>
</html>
