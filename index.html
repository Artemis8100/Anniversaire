<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anniversaire</title>
<style>
    body, html { 
        margin: 0; padding: 0; height: 100%; width: 100%; 
        overflow: hidden; background-color: black; 
        display: flex; align-items: center; justify-content: center;
        font-family: sans-serif;
    }
    video {
        /* On force la vidéo à prendre toute la place disponible */
        width: 100vw; 
        height: 100vh;
        /* 'cover' est parfait pour le format TikTok sur mobile */
        object-fit: cover; 
        display: none;
        background-color: black;
    }
    #overlay {
        text-align: center; color: white; cursor: pointer; z-index: 10;
        padding: 20px;
    }
    .play-button {
        width: 90px; height: 90px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 50%; display: flex;
        align-items: center; justify-content: center;
        margin: 0 auto 20px; border: 3px solid white;
        box-shadow: 0 0 15px rgba(255,255,255,0.3);
    }
</style>

<video id="myVideo" playsinline onended="this.pause()">
    <source src="video.mp4" type="video/mp4">
</video>
</head>
<body onclick="startExperience()">

    <div id="overlay">
        <div class="play-button">
            <div style="width: 0; height: 0; border-top: 15px solid transparent; border-bottom: 15px solid transparent; border-left: 25px solid white; margin-left: 5px;"></div>
        </div>
        <p>TOUCHEZ POUR LANCER</p>
    </div>

    <video id="myVideo" playsinline onended="this.pause()">
        <source src="video.mp4" type="video/mp4">
    </video>

    <script>
        function startExperience() {
            var vid = document.getElementById("myVideo");
            var overlay = document.getElementById("overlay");
            var docElm = document.documentElement;

            // Mode Plein Écran
            if (docElm.requestFullscreen) {
                docElm.requestFullscreen();
            } else if (docElm.webkitRequestFullscreen) {
                docElm.webkitRequestFullscreen();
            }

            overlay.style.display = "none";
            vid.style.display = "block";
            
            vid.muted = false; 
            vid.play();
        }
    </script>
</body>
</html>
