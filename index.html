<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anniversaire</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: black; 
            display: flex; align-items: center; justify-content: center;
            font-family: sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        video {
            width: 100vw; 
            height: 100vh;
            /* 'cover' remplit tout l'écran comme sur TikTok */
            object-fit: cover; 
            display: none;
            background-color: black;
        }
        #overlay {
            text-align: center; color: white; cursor: pointer; z-index: 10;
        }
        .play-button {
            width: 90px; height: 90px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            margin: 0 auto 20px; border: 3px solid white;
        }
    </style>
</head>
<body onclick="startExperience()">

    <div id="overlay">
        <div class="play-button">
            <div style="width: 0; height: 0; border-top: 15px solid transparent; border-bottom: 15px solid transparent; border-left: 25px solid white; margin-left: 5px;"></div>
        </div>
        <p style="font-weight: bold; letter-spacing: 1px;">CLIQUEZ POUR VOIR LE MESSAGE</p>
    </div>

    <video id="myVideo" playsinline onended="this.pause()">
        <source src="video.mp4" type="video/mp4">
    </video>

    <script>
        function startExperience() {
            var vid = document.getElementById("myVideo");
            var overlay = document.getElementById("overlay");
            var docElm = document.documentElement;

            // --- MODE CINÉMA TOTAL (Android) ---
            if (docElm.requestFullscreen) {
                docElm.requestFullscreen();
            } else if (docElm.webkitRequestFullscreen) {
                docElm.webkitRequestFullscreen();
            } else if (docElm.mozRequestFullScreen) {
                docElm.mozRequestFullScreen();
            }

            // --- GESTION DE LA VIDÉO ---
            overlay.style.display = "none";
            vid.style.display = "block";
            
            vid.muted = false; // On active le son
            vid.currentTime = 0; // On repart bien du début
            vid.play();
        }

        // Sécurité supplémentaire pour éviter la boucle sur certains navigateurs
        document.getElementById("myVideo").addEventListener('ended', function() {
            this.pause();
        }, false);
    </script>
</body>
</html>
